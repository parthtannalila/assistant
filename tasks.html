<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#E7EAE4;
    --surface:#FBFBF8;
    --ink:#1B1E1A;
    --muted:#797E76;
    --line:#D6D9D0;
    --accent:#2E6B54;
    --accent-soft:#DBEAE1;
    --warn:#B24A32;
    --warn-soft:#F1DED6;
    --radius:14px;
    --display:"Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --body:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }

  *{ box-sizing:border-box; }

  html,body{ margin:0; padding:0; }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
    line-height:1.45;
    padding:
      max(env(safe-area-inset-top), 0px)
      max(env(safe-area-inset-right), 0px)
      max(env(safe-area-inset-bottom), 0px)
      max(env(safe-area-inset-left), 0px);
  }

  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 96px;
  }

  /* ---- Hero: today is the anchor ---- */
  .hero{
    margin-bottom:26px;
  }
  .hero .eyebrow{
    font-family:var(--display);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }
  .hero-date{
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
  }
  .hero-dow{
    font-family:var(--display);
    font-weight:700;
    font-size:34px;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  .hero-num{
    font-family:var(--display);
    font-weight:500;
    font-size:34px;
    color:var(--accent);
  }
  .hero-rest{
    font-family:var(--display);
    font-weight:500;
    font-size:16px;
    color:var(--muted);
  }

  /* ---- Composer ---- */
  .composer{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:28px;
    box-shadow:0 1px 0 rgba(27,30,26,0.03);
  }
  .composer input[type="text"]{
    width:100%;
    border:none;
    background:transparent;
    color:var(--ink);
    font-family:var(--body);
    font-size:17px; /* >=16px stops iOS zoom-on-focus */
    padding:6px 2px;
    outline:none;
  }
  .composer input[type="text"]::placeholder{ color:var(--muted); }

  .composer-meta{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
    flex-wrap:wrap;
  }
  .composer-meta input[type="date"],
  .composer-meta input[type="time"]{
    -webkit-appearance:none;
    appearance:none;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-family:var(--mono);
    font-size:14px;
    padding:9px 10px;
    border-radius:9px;
    min-height:40px;
  }
  .composer-meta .spacer{ flex:1; }

  .btn-add{
    font-family:var(--display);
    font-weight:600;
    font-size:15px;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:10px;
    padding:11px 20px;
    min-height:44px;
    cursor:pointer;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn-add:active{ transform:scale(0.97); }
  .btn-add:disabled{ opacity:0.4; }

  /* ---- Groups ---- */
  .group{ margin-bottom:24px; }
  .group-head{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--display);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }
  .group-head .count{
    font-family:var(--mono);
    letter-spacing:0;
    color:var(--muted);
  }
  .group.overdue .group-head{ color:var(--warn); }

  /* ---- Task row ---- */
  .task{
    display:flex;
    align-items:flex-start;
    gap:12px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:13px 14px;
    margin-bottom:8px;
    animation:rise .18s ease;
  }
  .group.overdue .task{ border-left:3px solid var(--warn); }

  @keyframes rise{
    from{ opacity:0; transform:translateY(4px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .tick{
    flex:0 0 auto;
    width:24px;
    height:24px;
    margin-top:1px;
    border:2px solid var(--line);
    border-radius:7px;
    background:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    transition:border-color .12s ease, background .12s ease;
  }
  .tick svg{ width:14px; height:14px; opacity:0; transform:scale(0.6); transition:opacity .12s ease, transform .12s ease; }
  .task.done .tick{ background:var(--accent); border-color:var(--accent); }
  .task.done .tick svg{ opacity:1; transform:scale(1); }

  .task-body{ flex:1; min-width:0; }
  .task-text{
    font-size:16px;
    color:var(--ink);
    word-break:break-word;
  }
  .task.done .task-text{ color:var(--muted); text-decoration:line-through; }

  .chip{
    display:inline-block;
    margin-top:6px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--accent);
    background:var(--accent-soft);
    padding:3px 8px;
    border-radius:6px;
  }
  .group.overdue .chip{ color:var(--warn); background:var(--warn-soft); }

  .rowbtns{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:2px;
    margin-top:-2px;
  }

  .pencil{
    width:32px;
    height:32px;
    border:none;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0.55;
    transition:opacity .12s ease, color .12s ease;
  }
  .pencil svg{ width:16px; height:16px; }
  .pencil:active{ opacity:1; color:var(--accent); }

  .del{
    flex:0 0 auto;
    width:32px;
    height:32px;
    border:none;
    background:transparent;
    color:var(--muted);
    font-size:20px;
    line-height:1;
    cursor:pointer;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0.5;
    transition:opacity .12s ease, color .12s ease;
  }
  .del:active{ opacity:1; color:var(--warn); }

  /* ---- States ---- */
  .empty, .loading, .errbox{
    text-align:center;
    padding:40px 16px;
    color:var(--muted);
  }
  .empty .big{
    font-family:var(--display);
    font-weight:600;
    font-size:18px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .errbox{
    background:var(--warn-soft);
    color:var(--warn);
    border-radius:var(--radius);
    font-size:14px;
    line-height:1.5;
  }

  /* ---- Edit sheet ---- */
  .scrim{
    position:fixed;
    inset:0;
    background:rgba(27,30,26,0.38);
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
    z-index:40;
  }
  .scrim.open{ opacity:1; pointer-events:auto; }

  .sheet{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:50;
    background:var(--surface);
    border-top-left-radius:20px;
    border-top-right-radius:20px;
    border-top:1px solid var(--line);
    padding:16px 20px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(102%);
    transition:transform .22s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -8px 30px rgba(27,30,26,0.12);
  }
  .sheet.open{ transform:translateY(0); }
  @media (min-width:560px){
    .sheet{
      left:50%; right:auto; bottom:auto;
      top:50%;
      width:440px;
      transform:translate(-50%, -44%) scale(0.98);
      opacity:0;
      border-radius:18px;
      border:1px solid var(--line);
      transition:transform .18s ease, opacity .18s ease;
    }
    .sheet.open{ transform:translate(-50%, -50%) scale(1); opacity:1; }
  }

  .sheet-grip{
    width:38px; height:4px;
    background:var(--line);
    border-radius:99px;
    margin:0 auto 14px;
  }
  @media (min-width:560px){ .sheet-grip{ display:none; } }

  .sheet-title{
    font-family:var(--display);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:12px;
  }
  .sheet input[type="text"]{
    width:100%;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-family:var(--body);
    font-size:17px;
    padding:12px;
    border-radius:10px;
    outline:none;
  }
  .sheet input[type="text"]:focus{ border-color:var(--accent); }
  .sheet-meta{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .sheet-meta input[type="date"],
  .sheet-meta input[type="time"]{
    -webkit-appearance:none;
    appearance:none;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-family:var(--mono);
    font-size:14px;
    padding:11px 10px;
    border-radius:9px;
    min-height:44px;
    flex:1;
  }
  .sheet-clear{
    border:none;
    background:transparent;
    color:var(--muted);
    font-family:var(--body);
    font-size:13px;
    padding:8px 2px 0;
    cursor:pointer;
    text-decoration:underline;
  }
  .sheet-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .btn-save{
    flex:1;
    font-family:var(--display);
    font-weight:600;
    font-size:15px;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:10px;
    padding:13px;
    min-height:46px;
    cursor:pointer;
  }
  .btn-save:active{ transform:scale(0.99); }
  .btn-cancel{
    font-family:var(--display);
    font-weight:500;
    font-size:15px;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 20px;
    min-height:46px;
    cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    .task{ animation:none; }
    .btn-add:active{ transform:none; }
    .sheet, .scrim{ transition:none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">Your day</div>
      <div class="hero-date">
        <span class="hero-dow" id="heroDow">—</span>
        <span class="hero-num" id="heroNum">—</span>
        <span class="hero-rest" id="heroRest">—</span>
      </div>
    </header>

    <section class="composer">
      <input type="text" id="taskText" placeholder="What needs doing?" autocomplete="off" enterkeyhint="done" />
      <div class="composer-meta">
        <input type="date" id="taskDate" aria-label="Due date" />
        <input type="time" id="taskTime" aria-label="Due time" />
        <span class="spacer"></span>
        <button class="btn-add" id="addBtn">Add</button>
      </div>
    </section>

    <main id="list">
      <div class="loading">Connecting…</div>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Edit task">
    <div class="sheet-grip"></div>
    <div class="sheet-title">Edit task</div>
    <input type="text" id="editText" placeholder="Task" autocomplete="off" enterkeyhint="done" />
    <div class="sheet-meta">
      <input type="date" id="editDate" aria-label="Due date" />
      <input type="time" id="editTime" aria-label="Due time" />
    </div>
    <button class="sheet-clear" id="clearDate">Clear date &amp; time</button>
    <div class="sheet-actions">
      <button class="btn-cancel" id="cancelEdit">Cancel</button>
      <button class="btn-save" id="saveEdit">Save changes</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    doc, updateDoc, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBPSzwW-T23DskEBz9c5l5tvYltBCJpCyg",
    authDomain: "parth-assistant-12eb0.firebaseapp.com",
    projectId: "parth-assistant-12eb0",
    storageBucket: "parth-assistant-12eb0.firebasestorage.app",
    messagingSenderId: "455214693550",
    appId: "1:455214693550:web:dc522e55609fbecd13813f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const tasksCol = collection(db, "tasks");

  // ---- date helpers (all local / IST, never UTC) ----
  function localISO(d){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  const TODAY = localISO(new Date());
  const TOMORROW = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return localISO(d); })();

  // yyyy-mm-dd  ->  dd-mm-yyyy  (storage format in, display format out)
  function toDisplay(iso){
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return `${d}-${m}-${y}`;
  }
  function chipLabel(t){
    if (!t.due_date) return "";
    let base;
    if (t.due_date === TODAY) base = "Today";
    else if (t.due_date === TOMORROW) base = "Tomorrow";
    else base = toDisplay(t.due_date);
    return t.due_time ? `${base} · ${t.due_time}` : base;
  }

  // ---- hero ----
  (function paintHero(){
    const d = new Date();
    const dow = d.toLocaleDateString("en-GB", { weekday: "long" });
    const num = d.getDate();
    const rest = d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    document.getElementById("heroDow").textContent = dow;
    document.getElementById("heroNum").textContent = num;
    document.getElementById("heroRest").textContent = rest;
  })();

  // ---- classify + sort ----
  function classify(t){
    if (t.done) return "done";
    if (!t.due_date) return "someday";
    if (t.due_date < TODAY) return "overdue";
    if (t.due_date === TODAY) return "today";
    return "upcoming";
  }
  function createdMs(t){
    return (t.created_at && t.created_at.toMillis) ? t.created_at.toMillis() : Date.now();
  }
  function byDue(a, b){
    const da = (a.due_date || "9999") + (a.due_time || "99:99");
    const db_ = (b.due_date || "9999") + (b.due_time || "99:99");
    if (da !== db_) return da < db_ ? -1 : 1;
    return createdMs(a) - createdMs(b);
  }

  const GROUPS = [
    { key: "overdue",  label: "Overdue",  cls: "overdue" },
    { key: "today",    label: "Today",    cls: "today" },
    { key: "upcoming", label: "Upcoming", cls: "upcoming" },
    { key: "someday",  label: "No date",  cls: "someday" },
    { key: "done",     label: "Done",     cls: "done" }
  ];

  const CHECK_SVG = '<svg viewBox="0 0 20 20" fill="none"><path d="M4 10.5L8 14.5L16 5.5" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  const PENCIL_SVG = '<svg viewBox="0 0 20 20" fill="none"><path d="M13.6 2.9a1.6 1.6 0 0 1 2.3 0l1.2 1.2a1.6 1.6 0 0 1 0 2.3L7.4 16.1l-3.6.9.9-3.6 8.9-10.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  const listEl = document.getElementById("list");

  function render(tasks){
    if (tasks.length === 0){
      listEl.innerHTML =
        '<div class="empty"><div class="big">Nothing here yet</div>' +
        '<div>Add your first task above. A date is optional — leave it blank for a someday.</div></div>';
      return;
    }

    const buckets = {};
    for (const g of GROUPS) buckets[g.key] = [];
    for (const t of tasks) buckets[classify(t)].push(t);

    let html = "";
    for (const g of GROUPS){
      const items = buckets[g.key];
      if (items.length === 0) continue;
      items.sort(g.key === "done" ? (a, b) => createdMs(b) - createdMs(a)
               : g.key === "someday" ? (a, b) => createdMs(b) - createdMs(a)
               : byDue);

      html += `<section class="group ${g.cls}">`;
      html += `<div class="group-head">${g.label}<span class="count">${items.length}</span></div>`;
      for (const t of items){
        const chip = chipLabel(t);
        html += `<div class="task ${t.done ? "done" : ""}" data-id="${t.id}">`;
        html += `<button class="tick" data-act="toggle" aria-label="Mark done">${CHECK_SVG}</button>`;
        html += `<div class="task-body"><div class="task-text"></div>`;
        html += chip ? `<span class="chip">${chip}</span>` : "";
        html += `</div>`;
        html += `<div class="rowbtns">`;
        html += t.done ? "" : `<button class="pencil" data-act="edit" aria-label="Edit task">${PENCIL_SVG}</button>`;
        html += `<button class="del" data-act="del" aria-label="Delete">×</button>`;
        html += `</div>`;
        html += `</div>`;
      }
      html += `</section>`;
    }
    listEl.innerHTML = html;

    // set text via textContent to avoid any HTML injection from task text
    const rows = listEl.querySelectorAll(".task");
    let i = 0;
    const flat = [];
    for (const g of GROUPS) for (const t of buckets[g.key]) flat.push(t);
    // flat order won't match DOM if sorts differ — instead map by id
    const byId = {};
    for (const t of tasks) byId[t.id] = t;
    rows.forEach(row => {
      const t = byId[row.dataset.id];
      row.querySelector(".task-text").textContent = t ? t.text : "";
    });
  }

  // ---- live sync ----
  let current = [];
  onSnapshot(tasksCol, (snap) => {
    current = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render(current);
  }, (err) => {
    listEl.innerHTML =
      '<div class="errbox">Could not reach the database.<br>' +
      (err && err.code ? "(" + err.code + ") " : "") +
      'If this says permission-denied, the Firestore rules have expired or locked — tell me and we\'ll fix them.</div>';
  });

  // ---- add ----
  const textEl = document.getElementById("taskText");
  const dateEl = document.getElementById("taskDate");
  const timeEl = document.getElementById("taskTime");
  const addBtn = document.getElementById("addBtn");

  async function addTask(){
    const text = textEl.value.trim();
    if (!text) { textEl.focus(); return; }
    addBtn.disabled = true;
    try{
      await addDoc(tasksCol, {
        text,
        done: false,
        due_date: dateEl.value || null,   // yyyy-mm-dd from native picker
        due_time: timeEl.value || null,   // HH:MM
        note_id: null,                    // reserved for the notes link, later
        created_at: serverTimestamp()
      });
      textEl.value = ""; dateEl.value = ""; timeEl.value = "";
      textEl.focus();
    }catch(e){
      alert("Couldn't save that task. " + (e.message || ""));
    }finally{
      addBtn.disabled = false;
    }
  }

  addBtn.addEventListener("click", addTask);
  textEl.addEventListener("keydown", (e) => { if (e.key === "Enter") addTask(); });

  // ---- toggle / delete (event delegation) ----
  listEl.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-act]");
    if (!btn) return;
    const row = btn.closest(".task");
    if (!row) return;
    const id = row.dataset.id;
    const t = current.find(x => x.id === id);
    if (!t) return;

    if (btn.dataset.act === "toggle"){
      updateDoc(doc(db, "tasks", id), { done: !t.done }).catch(err => alert(err.message));
    } else if (btn.dataset.act === "del"){
      if (confirm("Delete this task?")){
        deleteDoc(doc(db, "tasks", id)).catch(err => alert(err.message));
      }
    } else if (btn.dataset.act === "edit"){
      openSheet(t);
    }
  });

  // ---- edit sheet ----
  const scrim = document.getElementById("scrim");
  const sheet = document.getElementById("sheet");
  const editText = document.getElementById("editText");
  const editDate = document.getElementById("editDate");
  const editTime = document.getElementById("editTime");
  const saveBtn = document.getElementById("saveEdit");
  let editingId = null;

  function openSheet(t){
    editingId = t.id;
    editText.value = t.text || "";
    editDate.value = t.due_date || "";
    editTime.value = t.due_time || "";
    scrim.classList.add("open");
    sheet.classList.add("open");
  }

  function closeSheet(){
    editingId = null;
    scrim.classList.remove("open");
    sheet.classList.remove("open");
  }

  async function saveEdit(){
    if (!editingId) return;
    const text = editText.value.trim();
    if (!text){ editText.focus(); return; }
    saveBtn.disabled = true;
    try{
      await updateDoc(doc(db, "tasks", editingId), {
        text,
        due_date: editDate.value || null,
        due_time: editTime.value || null
      });
      closeSheet();
    }catch(e){
      alert("Couldn't save those changes. " + (e.message || ""));
    }finally{
      saveBtn.disabled = false;
    }
  }

  saveBtn.addEventListener("click", saveEdit);
  document.getElementById("cancelEdit").addEventListener("click", closeSheet);
  scrim.addEventListener("click", closeSheet);
  document.getElementById("clearDate").addEventListener("click", () => {
    editDate.value = "";
    editTime.value = "";
  });
  editText.addEventListener("keydown", (e) => { if (e.key === "Enter") saveEdit(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && editingId) closeSheet(); });
</script>
</body>
</html>
